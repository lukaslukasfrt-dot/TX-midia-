<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX Advisor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Barlow+Condensed:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --or: #F4500A;
  --or2: #FF6B2B;
  --bg: #F5F3EF;
  --ink: #111010;
  --ink2: #6B6560;
  --ink3: #B5B0AA;
  --white: #FFFFFF;
  --line: #E2DDD8;
  --green: #1A7A3C;
  --green-l: #EAF5EE;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 50;
}

.nav-logo {
  display: flex;
  align-items: baseline;
  gap: 5px;
}

.nav-logo-tx {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 22px;
  letter-spacing: -0.5px;
  color: var(--or);
  text-transform: uppercase;
}

.nav-logo-advisor {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 500;
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--ink2);
  text-transform: uppercase;
}

.nav-tag {
  font-size: 11px;
  color: var(--ink3);
  letter-spacing: 0.5px;
}

/* ── WRAP ── */
.wrap { max-width: 660px; margin: 0 auto; padding: 36px 24px 80px; }

/* ── HERO BLOCK ── */
.hero {
  margin-bottom: 40px;
  padding-bottom: 36px;
  border-bottom: 1px solid var(--line);
}

.hero-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
}

.hero-empresa {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 52px;
  line-height: 0.95;
  letter-spacing: -1px;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 20px;
}

.hero-empresa span { color: var(--or); }

/* Progress */
.prog-wrap {
  display: flex;
  align-items: center;
  gap: 20px;
}

.prog-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 64px;
  line-height: 1;
  color: var(--or);
  letter-spacing: -2px;
  flex-shrink: 0;
}

.prog-num sup {
  font-size: 28px;
  letter-spacing: 0;
  vertical-align: super;
}

.prog-right { flex: 1; }

.prog-label {
  font-size: 12px;
  color: var(--ink2);
  margin-bottom: 8px;
  font-weight: 500;
}

.prog-bar {
  height: 3px;
  background: var(--line);
  border-radius: 2px;
  margin-bottom: 6px;
}

.prog-fill {
  height: 100%;
  background: var(--or);
  border-radius: 2px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

.prog-steps {
  font-size: 11px;
  color: var(--ink3);
}

/* ── SECTION ── */
.section { margin-bottom: 36px; }

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink3);
}

/* ── DORES ── */
.dore-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  user-select: none;
  transition: opacity .15s;
}

.dore-item:first-child { border-top: 1px solid var(--line); }
.dore-item:hover { opacity: .7; }

.dore-item.done { opacity: .45; }

.d-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--ink3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  font-size: 10px;
  color: var(--white);
}

.dore-item.done .d-check {
  background: var(--green);
  border-color: var(--green);
}

.d-text {
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  flex: 1;
  line-height: 1.4;
}

.dore-item.done .d-text {
  text-decoration: line-through;
  color: var(--ink3);
}

/* ── PHASE CARDS ── */
.phase-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: box-shadow .2s;
}

.phase-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.phase-card.ativa { border-color: var(--or); }
.phase-card.concluida { border-color: var(--green); }

.phase-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  cursor: pointer;
  user-select: none;
}

.phase-index {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 32px;
  line-height: 1;
  color: var(--line);
  flex-shrink: 0;
  width: 32px;
  text-align: center;
  transition: color .2s;
}

.phase-card.ativa .phase-index { color: var(--or); }
.phase-card.concluida .phase-index { color: var(--green); }

.phase-meta { flex: 1; min-width: 0; }

.phase-name {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 2px;
}

.phase-info {
  font-size: 11px;
  color: var(--ink3);
}

.phase-pill {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 100px;
  flex-shrink: 0;
}

.phase-pill.concluida { background: var(--green-l); color: var(--green); }
.phase-pill.ativa { background: #FEF0EA; color: var(--or); }
.phase-pill.pendente { background: var(--bg); color: var(--ink3); }

.phase-chevron {
  font-size: 10px;
  color: var(--ink3);
  transition: transform .2s;
  flex-shrink: 0;
}

.phase-card.open .phase-chevron { transform: rotate(180deg); }

.phase-body {
  display: none;
  padding: 0 18px 18px;
  border-top: 1px solid var(--line);
}

.phase-card.open .phase-body { display: block; }

.items-block { padding-top: 14px; }

.items-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
}

.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  user-select: none;
  transition: opacity .15s;
}

.check-item:last-child { border-bottom: none; }
.check-item:hover { opacity: .7; }
.check-item.done { opacity: .45; }

.cbox {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--ink3);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: var(--white);
  transition: all .15s;
}

.check-item.done .cbox { background: var(--green); border-color: var(--green); }

.itext {
  font-size: 13px;
  color: var(--ink);
  flex: 1;
  line-height: 1.4;
}

.check-item.done .itext { text-decoration: line-through; color: var(--ink3); }

.extras { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }

.extras-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 8px;
}

.entregavel {
  font-size: 12px;
  color: var(--ink2);
  padding: 3px 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

.entregavel::before { content: '→'; color: var(--or); font-weight: 700; }

.checkpoint {
  margin-top: 12px;
  background: var(--green-l);
  border-left: 3px solid var(--green);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 12px;
  color: var(--green);
  font-weight: 500;
}

.fase-prog {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--line);
}

.fase-prog-bar {
  height: 2px;
  background: var(--line);
  border-radius: 1px;
  margin-bottom: 6px;
}

.fase-prog-fill { height: 100%; border-radius: 1px; transition: width .3s; }

.fase-prog-txt { font-size: 11px; color: var(--ink3); }

/* ── LOADING / STATES ── */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink3);
  font-size: 13px;
}

.not-found { text-align: center; padding: 80px 20px; }

.not-found-icon { font-size: 40px; margin-bottom: 14px; }

.not-found h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }

.not-found p { font-size: 13px; color: var(--ink2); }

/* ── ANIM ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.wrap > * { animation: fadeUp .4s ease both; }
.wrap > *:nth-child(2) { animation-delay: .05s; }
.wrap > *:nth-child(3) { animation-delay: .1s; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <span class="nav-logo-tx">TX</span>
    <span class="nav-logo-advisor">Advisor</span>
  </div>
  <span class="nav-tag">by TX Mídia</span>
</nav>

<div class="wrap">
  <div id="content"><div class="loading">Carregando...</div></div>
</div>

<script>
const SUPABASE_URL='https://eztvuonuqdrjljvsrqih.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6dHZ1b251cWRyamxqdnNycWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODAyNzUsImV4cCI6MjA5NDI1NjI3NX0.Wc_E88qDKRMEzZDJu7WazrW3HfZGxVu51zsXDQIxNb4';
const HEADERS={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
const CORES=['#E53935','#FB8C00','#1E88E5','#43A047','#8E24AA','#00ACC1','#D81B60','#2E7D32'];

function getSlug(){return new URLSearchParams(window.location.search).get('slug')||'';}

async function loadCliente(slug){
  try{const r=await fetch(SUPABASE_URL+'/rest/v1/clientes?slug=eq.'+encodeURIComponent(slug)+'&limit=1',{headers:HEADERS});const d=await r.json();if(d&&d.length)return d[0];}catch(e){}
  try{const r=await fetch(SUPABASE_URL+'/rest/v1/clientes?select=id,empresa,slug,perfil,dores,fases,dc,fc,fo',{headers:HEADERS});const all=await r.json();if(!all||!all.length)return null;const ts=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');return all.find(c=>c.slug===slug||ts(c.empresa)===slug)||null;}catch(e){return null;}
}

async function save(id,fc,dc){
  const b=dc!==undefined?{fc,dc}:{fc};
  await fetch(SUPABASE_URL+'/rest/v1/clientes?id=eq.'+id,{method:'PATCH',headers:{...HEADERS,'Prefer':'return=minimal'},body:JSON.stringify(b)});
}

let G=null;

async function toggleDore(i){if(!G)return;const s=new Set(G.dc||[]);s.has(i)?s.delete(i):s.add(i);G.dc=[...s];await save(G.id,G.fc,G.dc);render();}
async function toggleItem(fi,ii){if(!G)return;if(!G.fc[fi])G.fc[fi]=[];const s=new Set(G.fc[fi]);const k='i'+ii;s.has(k)?s.delete(k):s.add(k);G.fc[fi]=[...s];await save(G.id,G.fc);render();}
function toggleFase(fi){const c=document.getElementById('ph-'+fi);if(c)c.classList.toggle('open');}

function render(){
  const ct=document.getElementById('content');
  const ds=new Set(G.dc||[]);
  let ti=0,tf=0;
  ti+=G.dores?G.dores.length:0; tf+=ds.size;
  G.fases.forEach((f,fi)=>{ti+=f.itens.length;tf+=(G.fc[fi]||[]).length;});
  const pct=ti>0?Math.round(tf/ti*100):0;

  let faseAtiva=-1;
  G.fases.forEach((f,fi)=>{if((G.fc[fi]||[]).length<f.itens.length&&faseAtiva===-1)faseAtiva=fi;});

  let h=`
  <div class="hero">
    <div class="hero-label">Sua jornada · 8 meses</div>
    <div class="hero-empresa">${G.empresa.split(' ').map((w,i)=>i===0?`<span>${w}</span>`:w).join(' ')}</div>
    <div class="prog-wrap">
      <div class="prog-num">${pct}<sup>%</sup></div>
      <div class="prog-right">
        <div class="prog-label">Progresso geral</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="prog-steps">${tf} de ${ti} etapas concluídas</div>
      </div>
    </div>
  </div>`;

  if(G.dores&&G.dores.length){
    h+=`<div class="section">
      <div class="section-head"><span class="section-title">Pontos de melhoria</span></div>`;
    G.dores.forEach((d,i)=>{const ok=ds.has(i);h+=`<div class="dore-item ${ok?'done':''}" onclick="toggleDore(${i})"><div class="d-check">${ok?'✓':''}</div><span class="d-text">${d}</span></div>`;});
    h+=`</div>`;
  }

  h+=`<div class="section"><div class="section-head"><span class="section-title">Fases</span></div>`;

  G.fases.forEach((f,fi)=>{
    const cks=new Set(G.fc[fi]||[]);
    const ft=f.itens.length,fd=cks.size,fp=ft>0?Math.round(fd/ft*100):0;
    const concluida=fd===ft&&ft>0,ativa=fi===faseAtiva;
    const cor=CORES[fi%CORES.length];
    const pill=concluida?'concluida':ativa?'ativa':'pendente';
    const pillTxt=concluida?'Concluída':ativa?'Em andamento':'Aguardando';

    h+=`<div class="phase-card ${concluida?'concluida':ativa?'ativa':''} ${ativa?'open':''}" id="ph-${fi}">
      <div class="phase-header" onclick="toggleFase(${fi})">
        <div class="phase-index">${fi+1}</div>
        <div class="phase-meta">
          <div class="phase-name">${f.t}</div>
          <div class="phase-info">${f.s} · ${f.m}</div>
        </div>
        <div class="phase-pill ${pill}">${pillTxt}</div>
        <div class="phase-chevron">▾</div>
      </div>
      <div class="phase-body">
        <div class="items-block">
          <div class="items-label">Etapas</div>`;

    f.itens.forEach((item,ii)=>{
      const ok=cks.has('i'+ii);
      h+=`<div class="check-item ${ok?'done':''}" onclick="toggleItem(${fi},${ii})">
        <div class="cbox">${ok?'✓':''}</div>
        <span class="itext">${item}</span>
      </div>`;
    });

    h+=`</div>`;

    if(f.ent&&f.ent.length){
      h+=`<div class="extras"><div class="extras-label">Entregáveis</div>`;
      f.ent.forEach(e=>{h+=`<div class="entregavel">${e}</div>`;});
      h+=`</div>`;
    }

    if(f.cp) h+=`<div class="checkpoint">${f.cp}</div>`;

    h+=`<div class="fase-prog">
      <div class="fase-prog-bar"><div class="fase-prog-fill" style="width:${fp}%;background:${cor}"></div></div>
      <div class="fase-prog-txt">${fp}% desta fase concluída</div>
    </div>
    </div></div>`;
  });

  h+=`</div>`;
  ct.innerHTML=h;
}

async function init(){
  const slug=getSlug();
  if(!slug){document.getElementById('content').innerHTML='<div class="not-found"><div class="not-found-icon">🔒</div><h3>Link inválido</h3><p>Verifique o link enviado pela TX Mídia.</p></div>';return;}
  const c=await loadCliente(slug);
  if(!c){document.getElementById('content').innerHTML='<div class="not-found"><div class="not-found-icon">🔒</div><h3>Cliente não encontrado</h3><p>Verifique o link enviado pela TX Mídia.</p></div>';return;}
  G=c; render();
}

init();
</script>
</body>
</html>
