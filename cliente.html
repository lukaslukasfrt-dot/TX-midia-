<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX Advisor — Minha Evolução</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f14;color:#e8e8f0;min-height:100vh;padding:24px 20px 60px}
.max{max-width:680px;margin:0 auto}
.header{text-align:center;margin-bottom:32px}
.tag{display:inline-block;background:#f97316;color:#fff;font-size:10px;font-weight:700;letter-spacing:3px;padding:4px 14px;border-radius:2px;margin-bottom:12px}
h1{font-size:22px;font-weight:800;margin-bottom:4px}
h1 span{color:#f97316}
.sub{font-size:13px;color:#6b6b8a}
.empresa-nome{font-size:26px;font-weight:800;color:#e8e8f0;margin-bottom:6px}
.welcome{font-size:13px;color:#6b6b8a;margin-bottom:20px}
.prog-geral{background:#16161f;border:1px solid #1e1e2e;border-radius:12px;padding:16px;margin-bottom:28px}
.prog-label{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#555570;margin-bottom:10px}
.prog-bar{height:8px;background:#1e1e2e;border-radius:6px;margin-bottom:8px}
.prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#f97316,#fb923c);transition:width .5s ease}
.prog-nums{display:flex;justify-content:space-between;font-size:12px;color:#6b6b8a}
.prog-pct{font-size:28px;font-weight:800;color:#f97316;margin-bottom:2px}
.section-title{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#555570;margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid #1e1e2e}
.phase-card{background:#16161f;border:1px solid #1e1e2e;border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.phase-card.concluida{border-color:#166534}
.phase-card.ativa{border-color:#f97316}
.phase-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none}
.phase-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.phase-meta{flex:1}
.phase-title{font-size:13px;font-weight:600;color:#e8e8f0}
.phase-sub{font-size:11px;color:#6b6b8a;margin-top:2px}
.phase-status{font-size:10px;padding:3px 10px;border-radius:100px;border:1px solid;white-space:nowrap;font-weight:600}
.phase-status.concluida{background:#052e16;color:#4ade80;border-color:#166534}
.phase-status.ativa{background:#431407;color:#fb923c;border-color:#c2410c}
.phase-status.pendente{background:#111118;color:#555570;border-color:#1e1e2e}
.phase-arrow{font-size:11px;color:#555570;transition:transform .2s;flex-shrink:0}
.phase-card.open .phase-arrow{transform:rotate(180deg)}
.phase-body{display:none;padding:0 16px 16px;border-top:1px solid #1e1e2e}
.phase-card.open .phase-body{display:block}
.items-list{display:flex;flex-direction:column;gap:5px;margin-top:12px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#111118;border:1px solid #1e1e2e;border-radius:8px;cursor:pointer;user-select:none;transition:all .15s}
.check-item:hover{border-color:#333348}
.check-item.done{background:#052e16;border-color:#166534}
.cbox{width:20px;height:20px;border-radius:5px;border:1.5px solid #333348;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#4ade80}
.check-item.done .cbox{background:#166534;border-color:#166634}
.itext{font-size:13px;color:#e8e8f0;flex:1;line-height:1.4}
.check-item.done .itext{color:#86efac;text-decoration:line-through}
.fase-prog{margin-top:12px}
.fase-prog-bar{height:4px;background:#1e1e2e;border-radius:3px;margin-bottom:4px}
.fase-prog-fill{height:100%;border-radius:3px;transition:width .3s}
.fase-prog-txt{font-size:11px;color:#6b6b8a}
.checkpoint{margin-top:12px;background:#052e16;border:1px solid #166534;border-radius:8px;padding:10px 14px;font-size:12px;color:#86efac;line-height:1.6}
.entregavel{display:flex;align-items:center;gap:6px;font-size:12px;color:#9ca3af;padding:3px 0}
.stitle-inner{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#555570;margin:14px 0 6px}
.not-found{text-align:center;padding:60px 20px}
.not-found-icon{font-size:40px;margin-bottom:12px}
.not-found h3{font-size:16px;font-weight:600;margin-bottom:6px}
.not-found p{font-size:13px;color:#6b6b8a}
.badge-wrap{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.badge-mes{display:inline-flex;align-items:center;gap:5px;background:#16161f;border:1px solid #1e1e2e;border-radius:100px;padding:4px 12px;font-size:11px;color:#6b6b8a}
.loading{text-align:center;padding:60px 20px;color:#6b6b8a;font-size:13px}
</style>
</head>
<body>
<div class="max">
  <div class="header">
    <div class="tag">TX MÍDIA</div>
    <h1>Minha <span>Evolução</span></h1>
    <p class="sub">Acompanhe seu progresso conosco</p>
  </div>
  <div id="content"><div class="loading">Carregando...</div></div>
</div>
<script>
const SUPABASE_URL='https://eztvuonuqdrjljvsrqih.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6dHZ1b251cWRyamxqdnNycWloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODAyNzUsImV4cCI6MjA5NDI1NjI3NX0.Wc_E88qDKRMEzZDJu7WazrW3HfZGxVu51zsXDQIxNb4';
const HEADERS={'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY};
const CORES=['#dc2626','#d97706','#2563eb','#059669','#7c3aed','#0891b2','#be185d','#15803d'];

function getSlug(){const p=new URLSearchParams(window.location.search);return p.get('slug')||'';}

async function loadCliente(slug){
  let r=await fetch(SUPABASE_URL+'/rest/v1/clientes?slug=eq.'+slug+'&limit=1',{headers:HEADERS});
  let data=await r.json();
  if(data&&data.length>0)return data[0];
  r=await fetch(SUPABASE_URL+'/rest/v1/clientes?select=*',{headers:HEADERS});
  data=await r.json();
  if(!data||!data.length)return null;
  function toSlug(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
  return data.find(c=>toSlug(c.empresa)===slug)||null;
}

async function saveItem(clienteId,fc){
  await fetch(`${SUPABASE_URL}/rest/v1/clientes?id=eq.${clienteId}`,{method:'PATCH',headers:{...HEADERS,'Prefer':'return=minimal'},body:JSON.stringify({fc})});
}

let clienteGlobal=null;

async function toggleItem(fi,ii){
  if(!clienteGlobal)return;
  const c=clienteGlobal;
  if(!c.fc[fi])c.fc[fi]=[];
  const s=new Set(c.fc[fi]);
  const k='i'+ii;
  s.has(k)?s.delete(k):s.add(k);
  c.fc[fi]=[...s];
  await saveItem(c.id,c.fc);
  renderCliente(c);
}

function toggleFase(fi){
  const card=document.getElementById('phase-'+fi);
  if(card)card.classList.toggle('open');
}

function renderCliente(c){
  clienteGlobal=c;
  const ct=document.getElementById('content');
  let totalItens=0,totalFeitos=0;
  c.fases.forEach((f,fi)=>{totalItens+=f.itens.length;totalFeitos+=(c.fc[fi]||[]).length;});
  const pctGeral=totalItens>0?Math.round(totalFeitos/totalItens*100):0;
  let faseAtiva=-1;
  c.fases.forEach((f,fi)=>{if((c.fc[fi]||[]).length<f.itens.length&&faseAtiva===-1)faseAtiva=fi;});

  let h=`<div style="margin-bottom:24px">
    <div class="empresa-nome">${c.empresa}</div>
    <div class="welcome">Acompanhe sua jornada de evolucao</div>
    <div class="badge-wrap">
      <span class="badge-mes">&#128197; Programa de 8 meses</span>
      <span class="badge-mes">&#9989; ${totalFeitos} de ${totalItens} etapas concluidas</span>
    </div>
    <div class="prog-geral">
      <div class="prog-label">Progresso geral</div>
      <div class="prog-pct">${pctGeral}%</div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pctGeral}%"></div></div>
      <div class="prog-nums"><span>Inicio</span><span>Conclusao</span></div>
    </div>
  </div>
  <div class="section-title">Suas fases</div>`;

  c.fases.forEach((f,fi)=>{
    const cks=new Set(c.fc[fi]||[]);
    const ft=f.itens.length,fd=cks.size,fp=ft>0?Math.round(fd/ft*100):0;
    const concluida=fd===ft&&ft>0,ativa=fi===faseAtiva;
    const cor=CORES[fi%CORES.length];
    const isOpen=ativa;
    const statusLabel=concluida?'Concluida':ativa?'Em andamento':'Proxima etapa';
    const statusCls=concluida?'concluida':ativa?'ativa':'pendente';

    h+=`<div class="phase-card ${concluida?'concluida':ativa?'ativa':''} ${isOpen?'open':''}" id="phase-${fi}">
      <div class="phase-header" onclick="toggleFase(${fi})">
        <div class="phase-num" style="background:${concluida?'#166534':ativa?cor:'#1e1e2e'}">${concluida?'&#10003;':fi+1}</div>
        <div class="phase-meta"><div class="phase-title">${f.t}</div><div class="phase-sub">${f.s} &middot; ${f.m}</div></div>
        <div class="phase-status ${statusCls}">${statusLabel}</div>
        <div class="phase-arrow">&#9660;</div>
      </div>
      <div class="phase-body">
        <div class="stitle-inner">Etapas</div>
        <div class="items-list">`;

    f.itens.forEach((item,ii)=>{
      const ok=cks.has('i'+ii);
      h+=`<div class="check-item ${ok?'done':''}" onclick="toggleItem(${fi},${ii})">
        <div class="cbox">${ok?'&#10003;':''}</div>
        <span class="itext">${item}</span>
      </div>`;
    });

    h+=`</div>`;
    if(f.ent&&f.ent.length){h+=`<div class="stitle-inner">Entregaveis desta fase</div>`;f.ent.forEach(e=>{h+=`<div class="entregavel">&#128204; ${e}</div>`;});}
    if(f.cp){h+=`<div class="checkpoint">&#9989; Meta: ${f.cp}</div>`;}
    h+=`<div class="fase-prog" style="margin-top:14px"><div class="fase-prog-bar"><div class="fase-prog-fill" style="width:${fp}%;background:${cor}"></div></div><div class="fase-prog-txt">${fp}% desta fase concluida</div></div></div></div>`;
  });

  ct.innerHTML=h;
}

async function init(){
  const slug=getSlug();
  if(!slug){document.getElementById('content').innerHTML='<div class="not-found"><div class="not-found-icon">&#128274;</div><h3>Link invalido</h3><p>Verifique o link enviado pela TX Midia.</p></div>';return;}
  try{
    const c=await loadCliente(slug);
    if(!c){document.getElementById('content').innerHTML='<div class="not-found"><div class="not-found-icon">&#128274;</div><h3>Cliente nao encontrado</h3><p>Verifique o link enviado pela TX Midia.</p></div>';return;}
    renderCliente(c);
  }catch(e){document.getElementById('content').innerHTML='<div class="not-found"><div class="not-found-icon">&#128274;</div><h3>Erro de conexao</h3><p>Tente novamente em alguns instantes.</p></div>';}
}

init();
</script>
</body>
</html>
