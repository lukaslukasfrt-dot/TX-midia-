<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX Advisor — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080810;
  --surface:#0d0d1a;
  --border:#1a1a2e;
  --border2:#252540;
  --orange:#f97316;
  --orange2:#fb923c;
  --green:#22c55e;
  --green-bg:rgba(34,197,94,0.08);
  --green-border:rgba(34,197,94,0.25);
  --red:#ef4444;
  --red-bg:rgba(239,68,68,0.08);
  --muted:#3a3a5c;
  --text:#e2e2f0;
  --text2:#8888aa;
  --text3:#4a4a6a;
  --gold:#e8a020;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.5}
.glow-orb{position:fixed;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(249,115,22,0.05) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none;z-index:0}

/* LAYOUT */
.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:28px 20px 80px}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.tx-logo{display:flex;align-items:center;gap:8px}
.tx-logo-mark{width:30px;height:30px;background:var(--orange);clip-path:polygon(0 100%,50% 0,100% 100%);flex-shrink:0}
.tx-logo-text{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.tx-logo-text span{color:var(--text2);font-size:12px;letter-spacing:1px}
.admin-badge{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;padding:3px 8px;border-radius:4px;border:1px solid rgba(249,115,22,0.3);color:var(--orange);background:rgba(249,115,22,0.06)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-nps{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;letter-spacing:.5px}
.btn-nps:hover,.btn-nps.ativo{border-color:var(--gold);color:var(--gold);background:rgba(232,160,32,0.06)}

/* CLIENT TABS */
.clients-bar{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.client-tab{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Syne',sans-serif;white-space:nowrap}
.client-tab:hover{border-color:var(--border2);color:var(--text)}
.client-tab.active{border-color:rgba(249,115,22,0.5);background:rgba(249,115,22,0.08);color:var(--orange)}
.client-tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.client-tab-del{background:transparent;border:none;color:var(--text3);font-size:14px;cursor:pointer;padding:0 0 0 4px;line-height:1;transition:color .15s}
.client-tab-del:hover{color:var(--red)}
.btn-add-client{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:1px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;white-space:nowrap}
.btn-add-client:hover{border-color:var(--orange);color:var(--orange)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:20px;padding:32px;width:100%;max-width:460px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:24px}
.modal label{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;margin-top:18px}
.modal input[type=text],.modal input[type=number]{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border2);background:#0a0a14;color:var(--text);font-size:13px;font-family:'Syne',sans-serif;outline:none;transition:border-color .15s}
.modal input:focus{border-color:var(--orange)}
.perfil-opts{display:flex;flex-direction:column;gap:6px;margin-top:4px}
.perfil-opt{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:#0a0a14}
.perfil-opt:hover{border-color:var(--border2)}
.perfil-opt.sel{border-color:var(--orange);background:rgba(249,115,22,0.06)}
.perfil-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.perfil-opt-name{font-size:13px;font-weight:700;color:var(--text)}
.perfil-opt-range{font-size:11px;color:var(--text2);margin-top:2px}
.modal-actions{display:flex;gap:8px;margin-top:24px}
.btn-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s}
.btn-cancel:hover{border-color:var(--border2);color:var(--text)}
.btn-create{flex:2;padding:10px;border-radius:8px;border:none;background:var(--orange);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;letter-spacing:.5px}
.btn-create:hover{background:#ea6c0a}
.btn-create:disabled{background:var(--border2);color:var(--text3);cursor:not-allowed}

/* PROFILE HEADER */
.profile-header{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
.profile-header::before{content:'ADMIN';position:absolute;right:-8px;top:-16px;font-family:'Bebas Neue',sans-serif;font-size:80px;color:rgba(249,115,22,0.03);letter-spacing:4px;pointer-events:none}
.profile-empresa{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;margin-bottom:4px}
.profile-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.profile-slug{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid var(--border2);color:var(--orange);background:rgba(249,115,22,0.06)}
.profile-perfil-tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid var(--border2);color:var(--text2)}
.mes-tag{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid rgba(249,115,22,0.3);color:var(--orange);background:rgba(249,115,22,0.06)}
.link-box{display:flex;align-items:center;gap:10px;background:#0a0a14;border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:16px}
.link-box span{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);flex:1;word-break:break-all}
.link-copy{padding:5px 12px;border-radius:6px;border:1px solid var(--orange);background:transparent;color:var(--orange);font-size:10px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;white-space:nowrap;letter-spacing:.5px}
.link-copy:hover{background:var(--orange);color:#fff}
.prog-track{height:4px;background:var(--border);border-radius:2px;margin-bottom:6px}
.prog-fill{height:100%;border-radius:2px;transition:width .4s ease}
.prog-text{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3)}

/* SECTIONS */
.sec-header{display:flex;align-items:center;gap:10px;margin:24px 0 14px}
.sec-line{flex:1;height:1px;background:var(--border)}
.sec-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);white-space:nowrap}

/* ITEMS */
.items-list{display:flex;flex-direction:column;gap:5px}
.check-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;transition:all .15s}
.check-item:hover{border-color:var(--border2)}
.check-item.done{background:var(--green-bg);border-color:var(--green-border)}
.check-clickable{cursor:pointer;display:flex;align-items:center;gap:10px;flex:1;user-select:none}
.cbox{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--green)}
.check-item.done .cbox{background:var(--green-bg);border-color:var(--green-border)}
.itext{font-size:13px;color:var(--text);flex:1;font-weight:600}
.check-item.done .itext{color:var(--green);text-decoration:line-through;opacity:.7}
.del-btn{width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:var(--text3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:inherit}
.del-btn:hover{background:var(--red-bg);color:var(--red)}

/* ADD ROW */
.add-row{display:flex;gap:7px;margin-top:8px}
.add-row input{flex:1;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-family:'Syne',sans-serif;outline:none;transition:border-color .15s}
.add-row input:focus{border-color:var(--orange)}
.add-row button{padding:8px 14px;border-radius:8px;border:1px solid var(--orange);background:transparent;color:var(--orange);font-size:11px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;white-space:nowrap;letter-spacing:.5px}
.add-row button:hover{background:var(--orange);color:#fff}

/* PHASE CARDS */
.phase-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden}
.phase-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s}
.phase-header:hover{background:#0f0f1e}
.phase-num-box{width:38px;height:38px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#fff;border-radius:8px}
.phase-meta{flex:1;min-width:0}
.phase-title{font-size:13px;font-weight:700;color:var(--text)}
.phase-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-top:2px}
.phase-badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 10px;border-radius:100px;background:#0a0a14;color:var(--text3);border:1px solid var(--border);white-space:nowrap}
.phase-chevron{color:var(--text3);font-size:11px;transition:transform .25s;flex-shrink:0}
.phase-card.open .phase-chevron{transform:rotate(180deg)}
.phase-body{display:none;padding:16px;border-top:1px solid var(--border);background:#0a0a14}
.phase-card.open .phase-body{display:block}
.add-item-row{display:flex;gap:7px;margin-top:8px}
.add-item-row input{flex:1;padding:7px 11px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-family:'Syne',sans-serif;outline:none;transition:border-color .15s}
.add-item-row input:focus{border-color:var(--orange)}
.add-item-row button{padding:7px 12px;border-radius:8px;border:1px solid var(--orange);background:transparent;color:var(--orange);font-size:11px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;transition:all .15s;white-space:nowrap}
.add-item-row button:hover{background:var(--orange);color:#fff}
.entregavel{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);padding:4px 0}
.del-dot{width:4px;height:4px;border-radius:50%;background:var(--orange);flex-shrink:0}
.checkpoint-box{margin-top:12px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--green)}
.fase-bar-track{height:3px;background:var(--border);border-radius:2px;margin-top:12px}
.fase-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.fase-bar-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-top:5px}

/* NPS */
.nps-panel{}
.nps-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.nps-stat-card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:16px;text-align:center}
.nps-stat-val{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);letter-spacing:2px}
.nps-stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:4px}
.nps-cards{display:flex;flex-direction:column;gap:6px}
.nps-card{display:grid;grid-template-columns:1.5fr 0.7fr 0.7fr 3fr;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;transition:border-color .2s}
.nps-card:hover{border-color:var(--border2)}
.nps-card.pending{opacity:.45}
.nps-cname{font-size:13px;font-weight:700;color:var(--text)}
.nps-plabel{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:1px}
.nps-ring{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:16px;margin:0 auto}
.nps-ring-10{background:rgba(232,160,32,.12);border:2px solid var(--gold);color:var(--gold)}
.nps-ring-9{background:rgba(255,215,0,.08);border:2px solid #ffd700;color:#ffd700}
.nps-ring-7{background:rgba(136,136,136,.1);border:2px solid #555;color:#888}
.nps-ring-empty{background:transparent;border:1.5px dashed var(--border2);color:var(--text3);font-size:11px}
.nps-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;margin:0 auto}
.nps-badge-yes{background:rgba(232,160,32,.1);color:var(--gold);border:1px solid rgba(232,160,32,.3)}
.nps-badge-no{background:transparent;color:var(--text3);border:1px dashed var(--border2)}
.nps-opinion{font-size:12px;color:var(--text2);line-height:1.5;font-style:italic;padding-left:12px;border-left:2px solid var(--gold)}
.nps-opinion-empty{font-size:12px;color:var(--text3);padding-left:12px;border-left:2px dashed var(--border2)}

/* STATES */
.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:48px;margin-bottom:16px}
.empty h3{font-size:16px;font-weight:700;margin-bottom:8px}
.empty p{font-size:13px;color:var(--text2);margin-bottom:20px}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;border:none;background:var(--orange);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;letter-spacing:.5px}
.loading{text-align:center;padding:60px 20px;color:var(--text2)}
.loading-ring{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>

let clientes=[],ativo=null,modalPerfilSel=null,abaAtiva='clientes';
function toSlug(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

async function api(method,path,body){
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{method,headers:{...HEADERS,'Prefer':method==='POST'?'return=representation':''},body:body?JSON.stringify(body):undefined});
  if(!r.ok){const e=await r.text();throw new Error(e);}
  return method==='DELETE'?null:r.json();
}

async function loadClientes(){
  try{clientes=await api('GET','clientes?order=created_at.asc');if(clientes.length>0&&!ativo)ativo=clientes[0].id;renderAll();}
  catch(e){document.getElementById('content').innerHTML='<div class="loading">Erro ao carregar. Verifique a conexão.</div>';}
}

async function saveCliente(c){
  try{await api('PATCH','clientes?id=eq.'+c.id,{dores:c.dores,fases:c.fases,dc:c.dc,fc:c.fc,fo:c.fo});}
  catch(e){console.error('Erro ao salvar:',e);}
}

function getAtivo(){return clientes.find(c=>c.id===ativo);}

function openModal(){document.getElementById('m-empresa').value='';document.getElementById('m-mes').value='';modalPerfilSel=null;['a','b','c'].forEach(p=>document.getElementById('opt-'+p).className='perfil-opt');document.getElementById('btn-create').disabled=true;document.getElementById('modal').style.display='flex';setTimeout(()=>document.getElementById('m-empresa').focus(),100);}
function closeModal(){document.getElementById('modal').style.display='none';}
function selPerfil(p){modalPerfilSel=p;['a','b','c'].forEach(x=>document.getElementById('opt-'+x).className='perfil-opt'+(x===p?' sel':''));checkModal();}
function checkModal(){document.getElementById('btn-create').disabled=!(document.getElementById('m-empresa').value.trim()&&modalPerfilSel);}

async function criarCliente(){
  const empresa=document.getElementById('m-empresa').value.trim();
  if(!empresa||!modalPerfilSel)return;
  document.getElementById('btn-create').disabled=true;
  document.getElementById('btn-create').textContent='Criando...';
  const base=perfisBase[modalPerfilSel],id='c'+Date.now(),slug=toSlug(empresa);
  const mesInicio=parseInt(document.getElementById('m-mes').value)||1;
  const novo={id,empresa,slug,perfil:modalPerfilSel,mes_inicio:mesInicio,dores:[...base.dores],fases:JSON.parse(JSON.stringify(base.fases)),dc:[],fc:{},fo:{}};
  try{
    await api('POST','clientes',novo);clientes.push(novo);ativo=id;closeModal();renderAll();
  }catch(e){alert('Erro ao criar cliente.');document.getElementById('btn-create').disabled=false;document.getElementById('btn-create').textContent='Criar Cliente';}
}

async function deleteCliente(id){
  if(!confirm('Remover este cliente permanentemente?'))return;
  try{await api('DELETE','clientes?id=eq.'+id);clientes=clientes.filter(c=>c.id!==id);ativo=clientes.length?clientes[0].id:null;renderAll();}
  catch(e){alert('Erro ao remover.');}
}

function setAtivo(id){abaAtiva='clientes';ativo=id;renderAll();}
function setNPS(){abaAtiva='nps';renderAll();}
function toggleDore(i){const c=getAtivo();const s=new Set(c.dc);s.has(i)?s.delete(i):s.add(i);c.dc=[...s];saveCliente(c);render();}
function deleteDore(i){const c=getAtivo();c.dores.splice(i,1);const s=new Set(c.dc);const n=new Set();s.forEach(x=>{if(x<i)n.add(x);else if(x>i)n.add(x-1);});c.dc=[...n];saveCliente(c);render();}
function addDore(){const el=document.getElementById('nova-dore');const v=el.value.trim();if(!v)return;getAtivo().dores.push(v);el.value='';saveCliente(getAtivo());render();}
function toggleFase(fi){const c=getAtivo();c.fo[fi]=!c.fo[fi];saveCliente(c);render();}
function toggleFaseItem(fi,ii){const c=getAtivo();if(!c.fc[fi])c.fc[fi]=[];const s=new Set(c.fc[fi]);const k='i'+ii;s.has(k)?s.delete(k):s.add(k);c.fc[fi]=[...s];saveCliente(c);render();}
function deleteFaseItem(fi,ii){const c=getAtivo();c.fases[fi].itens.splice(ii,1);if(c.fc[fi]){const s=new Set(c.fc[fi]);const n=new Set();s.forEach(k=>{const x=parseInt(k.slice(1));if(x<ii)n.add('i'+x);else if(x>ii)n.add('i'+(x-1));});c.fc[fi]=[...n];}saveCliente(c);render();}
function addFaseItem(fi){const el=document.getElementById('add-item-'+fi);const v=el.value.trim();if(!v)return;getAtivo().fases[fi].itens.push(v);el.value='';saveCliente(getAtivo());render();}
function copyLink(slug){navigator.clipboard.writeText(window.location.origin+'/cliente_novo?slug='+slug).then(()=>{const b=document.querySelector('.link-copy');if(b){b.textContent='Copiado!';setTimeout(()=>b.textContent='Copiar',2000);}});}

function renderAll(){renderBar();render();}

function renderBar(){
  const bar=document.getElementById('clients-bar');let h='';
  clientes.forEach(c=>{
    const p=perfisBase[c.perfil],ia=c.id===ativo;
    h+=`<button class="client-tab ${ia?'active':''}" onclick="setAtivo('${c.id}')">
      <div class="client-tab-dot" style="background:${p.dot}"></div>${c.empresa}
      ${ia?`<button class="client-tab-del" onclick="event.stopPropagation();deleteCliente('${c.id}')">×</button>`:''}
    </button>`;
  });
  h+=`<button class="btn-add-client" onclick="openModal()">+ Novo cliente</button>`;
  bar.innerHTML=h;
  document.getElementById('btn-nps').className='btn-nps'+(abaAtiva==='nps'?' ativo':'');
}

function renderNPS(){
  document.getElementById('content').innerHTML=`
  <div class="nps-panel">
    <div class="nps-stats-row">
      <div class="nps-stat-card"><div class="nps-stat-val">4</div><div class="nps-stat-lbl">Responderam</div></div>
      <div class="nps-stat-card"><div class="nps-stat-val">9.0</div><div class="nps-stat-lbl">Nota Média</div></div>
      <div class="nps-stat-card"><div class="nps-stat-val">10</div><div class="nps-stat-lbl">Total</div></div>
    </div>
    <div class="nps-cards">
      <div class="nps-card pending"><div><div class="nps-cname">Smartphone Service</div></div><div><div class="nps-ring nps-ring-empty" style="margin:0 auto">—</div></div><div><div class="nps-badge nps-badge-no" style="margin:0 auto">Pendente</div></div><div class="nps-opinion-empty">Aguardando resposta</div></div>
      <div class="nps-card"><div><div class="nps-cname">CS Água da Boa</div></div><div><div class="nps-ring nps-ring-10" style="margin:0 auto">10</div></div><div><div class="nps-badge nps-badge-yes" style="margin:0 auto">✓ Sim</div></div><div class="nps-opinion">"O grande diferencial é ter alguém fora da sua operação te ajudando."</div></div>
      <div class="nps-card pending"><div><div class="nps-cname">Fix na Hora</div><div class="nps-plabel">Não respondeu</div></div><div><div class="nps-ring nps-ring-empty" style="margin:0 auto">—</div></div><div><div class="nps-badge nps-badge-no" style="margin:0 auto">Pendente</div></div><div class="nps-opinion-empty">Aguardando resposta</div></div>
      <div class="nps-card"><div><div class="nps-cname">Senhor Smart BH</div></div><div><div class="nps-ring nps-ring-9" style="margin:0 auto">9</div></div><div><div class="nps-badge nps-badge-yes" style="margin:0 auto">✓ Sim</div></div><div class="nps-opinion">"Faz todo sentido, está me ajudando muitoooo."</div></div>
      <div class="nps-card"><div><div class="nps-cname">Ed Celular</div></div><div><div class="nps-ring nps-ring-10" style="margin:0 auto">10</div></div><div><div class="nps-badge nps-badge-yes" style="margin:0 auto">✓ Sim</div></div><div class="nps-opinion">"Os prazos e metas nos ajudam a manter foco e constância."</div></div>
      <div class="nps-card"><div><div class="nps-cname">Casa do Notebook</div></div><div><div class="nps-ring nps-ring-7" style="margin:0 auto">7</div></div><div><div class="nps-badge nps-badge-yes" style="margin:0 auto">✓ Sim</div></div><div class="nps-opinion">"Sinto falha no cronograma e que a metodologia está ultrapassada."</div></div>
    </div>
  </div>`;
}

function render(){
  if(abaAtiva==='nps'){renderNPS();return;}
  const ct=document.getElementById('content');const c=getAtivo();
  if(!c){ct.innerHTML='<div class="empty"><div class="empty-icon">🏢</div><h3>Nenhum cliente ainda</h3><p>Adicione o primeiro cliente para começar.</p><button class="btn-primary" onclick="openModal()">+ Adicionar cliente</button></div>';return;}
  const p=perfisBase[c.perfil];const ds=new Set(c.dc);const tot=c.dores.length,dn=ds.size,pct=tot>0?Math.round(dn/tot*100):0;
  const slug=c.slug||toSlug(c.empresa);

  let h=`<div class="profile-header">
    <div class="profile-empresa">${c.empresa}</div>
    <div class="profile-meta">
      <span class="profile-slug">${slug}</span>
      <span class="profile-perfil-tag">${p.label} · ${p.range}</span>
      <span class="mes-tag">Mês ${c.mes_inicio||1} de 8</span>
    </div>
    <div class="link-box">
      <span>/cliente_novo?slug=${slug}</span>
      <button class="link-copy" onclick="copyLink('${slug}')">Copiar</button>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${p.color}"></div></div>
    <div class="prog-text" style="margin-top:6px">${dn} de ${tot} pontos abordados (${pct}%)</div>
  </div>`;

  h+=`<div class="sec-header"><div class="sec-line"></div><div class="sec-label">Dores do Cliente</div><div class="sec-line"></div></div>`;
  h+=`<div class="items-list">`;
  c.dores.forEach((d,i)=>{
    const ok=ds.has(i);
    h+=`<div class="check-item ${ok?'done':''}">
      <div class="check-clickable" onclick="toggleDore(${i})"><div class="cbox">${ok?'✓':''}</div><span class="itext">${d}</span></div>
      <button class="del-btn" onclick="deleteDore(${i})">×</button>
    </div>`;
  });
  h+=`</div><div class="add-row"><input id="nova-dore" type="text" placeholder="Adicionar ponto de melhoria..." onkeydown="if(event.key==='Enter')addDore()"><button onclick="addDore()">+ Add</button></div>`;

  h+=`<div class="sec-header"><div class="sec-line"></div><div class="sec-label">Fases de Entrega · 8 Meses</div><div class="sec-line"></div></div>`;

  c.fases.forEach((f,fi)=>{
    const cks=new Set(c.fc[fi]||[]);const ft=f.itens.length,fd=cks.size,fp=ft>0?Math.round(fd/ft*100):0;
    const io=!!c.fo[fi];const cor=CORES[fi%CORES.length];
    h+=`<div class="phase-card ${io?'open':''}">
      <div class="phase-header" onclick="toggleFase(${fi})">
        <div class="phase-num-box" style="background:${cor}">${fi+1}</div>
        <div class="phase-meta">
          <div class="phase-title">${f.t}</div>
          <div class="phase-sub">${f.s} · ${fd}/${ft} itens</div>
        </div>
        <div class="phase-badge">${f.m}</div>
        <div class="phase-chevron">▼</div>
      </div>
      <div class="phase-body">
        <div class="items-list">`;
    f.itens.forEach((item,ii)=>{
      const ok=cks.has('i'+ii);
      h+=`<div class="check-item ${ok?'done':''}">
        <div class="check-clickable" onclick="toggleFaseItem(${fi},${ii})"><div class="cbox">${ok?'✓':''}</div><span class="itext">${item}</span></div>
        <button class="del-btn" onclick="deleteFaseItem(${fi},${ii})">×</button>
      </div>`;
    });
    h+=`</div><div class="add-item-row"><input id="add-item-${fi}" type="text" placeholder="Adicionar item..." onkeydown="if(event.key==='Enter')addFaseItem(${fi})"><button onclick="addFaseItem(${fi})">+ Item</button></div>`;
    if(f.ent&&f.ent.length){h+=`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)">`;f.ent.forEach(e=>{h+=`<div class="entregavel"><div class="del-dot"></div>${e}</div>`;});h+=`</div>`;}
    if(f.cp){h+=`<div class="checkpoint-box">✦ ${f.cp}</div>`;}
    h+=`<div class="fase-bar-track"><div class="fase-bar-fill" style="width:${fp}%;background:${cor}"></div></div><div class="fase-bar-txt">${fp}% concluído</div>`;
    h+=`</div></div>`;
  });

  ct.innerHTML=h;
}

loadClientes();
</script>
