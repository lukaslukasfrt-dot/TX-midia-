<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TX Advisor — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&family=Barlow+Condensed:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --or: #F4500A;
  --or2: #FF6B2B;
  --or-l: #FEF0EA;
  --bg: #F5F3EF;
  --ink: #111010;
  --ink2: #6B6560;
  --ink3: #B5B0AA;
  --white: #FFFFFF;
  --line: #E2DDD8;
  --green: #1A7A3C;
  --green-l: #EAF5EE;
  --red: #D93025;
  --red-l: #FDECEA;
  --gold: #C89B2A;
  --gold-l: #FBF5E6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 50;
  gap: 12px;
  flex-wrap: wrap;
}

.nav-left { display: flex; align-items: center; gap: 12px; }

.nav-logo { display: flex; align-items: baseline; gap: 5px; }
.nav-logo-tx { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 22px; letter-spacing: -0.5px; color: var(--or); text-transform: uppercase; }
.nav-logo-adv { font-family: 'Barlow Condensed', sans-serif; font-weight: 500; font-size: 16px; letter-spacing: 2px; color: var(--ink2); text-transform: uppercase; }

.admin-chip {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  background: var(--ink);
  color: var(--white);
  padding: 3px 8px;
  border-radius: 4px;
}

.nav-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }

.btn-nps {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .5px;
  padding: 7px 16px;
  border-radius: 8px;
  border: 1.5px solid var(--line);
  background: transparent;
  color: var(--ink2);
  cursor: pointer;
  transition: all .15s;
}
.btn-nps:hover, .btn-nps.ativo { border-color: var(--gold); color: var(--gold); background: var(--gold-l); }

/* ── CLIENT TABS ── */
.clients-wrap {
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 2px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.client-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 14px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink3);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  white-space: nowrap;
  transition: all .15s;
  background: transparent;
  border-left: none;
  border-right: none;
  border-top: none;
  font-family: 'DM Sans', sans-serif;
}

.client-tab:hover { color: var(--ink2); }
.client-tab.active { color: var(--or); border-bottom-color: var(--or); }

.client-tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.client-tab-del {
  background: transparent;
  border: none;
  color: var(--ink3);
  font-size: 14px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: color .15s;
  font-family: inherit;
}
.client-tab-del:hover { color: var(--red); }

.btn-add-tab {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 14px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--or);
  cursor: pointer;
  white-space: nowrap;
  background: transparent;
  border: none;
  font-family: 'DM Sans', sans-serif;
  transition: opacity .15s;
  flex-shrink: 0;
}
.btn-add-tab:hover { opacity: .7; }

/* ── WRAP ── */
.wrap { max-width: 720px; margin: 0 auto; padding: 36px 24px 80px; }

/* ── PROFILE HEADER ── */
.profile-head {
  padding-bottom: 28px;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--line);
}

.profile-empresa {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 44px;
  line-height: 0.95;
  letter-spacing: -1px;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 12px;
}

.profile-empresa span { color: var(--or); }

.meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}

.meta-chip {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 100px;
  border: 1px solid var(--line);
  color: var(--ink2);
  background: var(--white);
}

.meta-chip.orange { border-color: var(--or); color: var(--or); background: var(--or-l); }

.link-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 14px;
}

.link-row span {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink2);
  flex: 1;
  word-break: break-all;
}

.link-copy {
  font-size: 11px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 6px;
  border: 1.5px solid var(--or);
  background: transparent;
  color: var(--or);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
  white-space: nowrap;
  letter-spacing: .5px;
}
.link-copy:hover { background: var(--or); color: var(--white); }

.prog-track { height: 2px; background: var(--line); border-radius: 1px; margin-bottom: 6px; }
.prog-fill { height: 100%; border-radius: 1px; transition: width .4s ease; }
.prog-txt { font-size: 11px; color: var(--ink3); }

/* ── SECTIONS ── */
.section { margin-bottom: 32px; }

.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink3);
}

/* ── DORES ── */
.dore-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
}

.dore-item:first-child { border-top: 1px solid var(--line); }

.d-click {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1;
  cursor: pointer;
  user-select: none;
  transition: opacity .15s;
}

.d-click:hover { opacity: .7; }

.dore-item.done .d-click { opacity: .45; }

.d-check {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1.5px solid var(--ink3);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--white);
  transition: all .15s;
}

.dore-item.done .d-check { background: var(--green); border-color: var(--green); }

.d-text { font-size: 13px; color: var(--ink); flex: 1; line-height: 1.4; font-weight: 400; }
.dore-item.done .d-text { text-decoration: line-through; color: var(--ink3); }

.del-btn {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--ink3);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
  font-family: inherit;
}
.del-btn:hover { background: var(--red-l); color: var(--red); }

/* ADD ROW */
.add-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.add-row input {
  flex: 1;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--line);
  background: var(--white);
  color: var(--ink);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .15s;
}

.add-row input:focus { border-color: var(--or); }
.add-row input::placeholder { color: var(--ink3); }

.add-row button {
  padding: 9px 16px;
  border-radius: 8px;
  border: 1.5px solid var(--or);
  background: transparent;
  color: var(--or);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
  white-space: nowrap;
  letter-spacing: .5px;
}
.add-row button:hover { background: var(--or); color: var(--white); }

/* ── PHASE CARDS ── */
.phase-card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
}

.phase-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 15px 18px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}

.phase-header:hover { background: var(--bg); }

.phase-index {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 30px;
  line-height: 1;
  color: var(--line);
  flex-shrink: 0;
  width: 28px;
  text-align: center;
  transition: color .2s;
}

.phase-card.open .phase-index { color: var(--or); }

.phase-meta { flex: 1; min-width: 0; }
.phase-name { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.phase-sub { font-size: 11px; color: var(--ink3); }

.phase-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .5px;
  padding: 4px 10px;
  border-radius: 100px;
  background: var(--bg);
  color: var(--ink3);
  border: 1px solid var(--line);
  white-space: nowrap;
  flex-shrink: 0;
}

.phase-chevron { font-size: 10px; color: var(--ink3); transition: transform .2s; flex-shrink: 0; }
.phase-card.open .phase-chevron { transform: rotate(180deg); }

.phase-body {
  display: none;
  padding: 16px 18px 18px;
  border-top: 1px solid var(--line);
}

.phase-card.open .phase-body { display: block; }

.body-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
}

/* items */
.check-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid var(--line);
}
.check-item:last-of-type { border-bottom: none; }

.check-click {
  display: flex; align-items: center; gap: 10px; flex: 1;
  cursor: pointer; user-select: none; transition: opacity .15s;
}
.check-click:hover { opacity: .7; }
.check-item.done .check-click { opacity: .45; }

.cbox {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1.5px solid var(--ink3);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--white);
  transition: all .15s;
}
.check-item.done .cbox { background: var(--green); border-color: var(--green); }
.itext { font-size: 13px; color: var(--ink); flex: 1; line-height: 1.4; }
.check-item.done .itext { text-decoration: line-through; color: var(--ink3); }

.add-item-row {
  display: flex; gap: 8px; margin-top: 10px;
}
.add-item-row input {
  flex: 1; padding: 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--line); background: var(--bg);
  color: var(--ink); font-size: 12px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .15s;
}
.add-item-row input:focus { border-color: var(--or); }
.add-item-row input::placeholder { color: var(--ink3); }
.add-item-row button {
  padding: 8px 14px; border-radius: 8px;
  border: 1.5px solid var(--or); background: transparent;
  color: var(--or); font-size: 11px; font-weight: 700;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all .15s; white-space: nowrap;
}
.add-item-row button:hover { background: var(--or); color: var(--white); }

.entregavel {
  font-size: 12px; color: var(--ink2);
  padding: 3px 0;
  display: flex; align-items: center; gap: 8px;
}
.entregavel::before { content: '→'; color: var(--or); font-weight: 700; }

.checkpoint {
  margin-top: 12px;
  background: var(--green-l);
  border-left: 3px solid var(--green);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 12px; color: var(--green); font-weight: 500;
}

.fase-prog { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--line); }
.fase-prog-track { height: 2px; background: var(--line); border-radius: 1px; margin-bottom: 6px; }
.fase-prog-fill { height: 100%; border-radius: 1px; transition: width .3s; }
.fase-prog-txt { font-size: 11px; color: var(--ink3); }

/* ── NPS ── */
.nps-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 24px;
}

.nps-stat {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}

.nps-stat-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900;
  font-size: 40px;
  color: var(--gold);
  line-height: 1;
  letter-spacing: -1px;
}

.nps-stat-lbl {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--ink3);
  margin-top: 4px;
}

.nps-list { display: flex; flex-direction: column; gap: 6px; }

.nps-row {
  display: grid;
  grid-template-columns: 1.6fr 0.7fr 0.7fr 3fr;
  align-items: center;
  gap: 14px;
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  transition: border-color .15s;
}

.nps-row:hover { border-color: var(--ink3); }
.nps-row.pending { opacity: .5; }

.nps-name { font-size: 13px; font-weight: 700; color: var(--ink); }
.nps-sub { font-size: 10px; color: var(--ink3); margin-top: 1px; letter-spacing: .5px; text-transform: uppercase; }

.nps-ring {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 16px;
  margin: 0 auto;
}

.nps-ring-10 { background: var(--gold-l); border: 2px solid var(--gold); color: var(--gold); }
.nps-ring-9 { background: #FFFDE6; border: 2px solid #F9CC22; color: #B8960A; }
.nps-ring-7 { background: #F5F5F5; border: 2px solid #CCC; color: #888; }
.nps-ring-empty { background: transparent; border: 1.5px dashed var(--line); color: var(--ink3); font-size: 12px; }

.nps-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 100px;
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
  margin: 0 auto;
}
.nps-yes { background: var(--gold-l); color: var(--gold); border: 1px solid #E8C86A; }
.nps-no { background: var(--bg); color: var(--ink3); border: 1px solid var(--line); }

.nps-quote { font-size: 12px; color: var(--ink2); line-height: 1.5; font-style: italic; padding-left: 12px; border-left: 2px solid var(--gold); }
.nps-empty { font-size: 12px; color: var(--ink3); padding-left: 12px; border-left: 2px dashed var(--line); }

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(17,16,16,.6);
  backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
}

.modal {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 32px;
  width: 100%; max-width: 460px;
}

.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 900; font-size: 32px; letter-spacing: -1px;
  text-transform: uppercase; color: var(--ink);
  margin-bottom: 4px;
}

.modal-sub { font-size: 13px; color: var(--ink2); margin-bottom: 24px; }

.modal label {
  display: block;
  font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--ink3); margin-bottom: 7px; margin-top: 18px;
}

.modal input {
  width: 100%; padding: 10px 14px;
  border-radius: 8px; border: 1.5px solid var(--line);
  background: var(--bg); color: var(--ink);
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  outline: none; transition: border-color .15s;
}
.modal input:focus { border-color: var(--or); }
.modal input::placeholder { color: var(--ink3); }

.perfil-opts { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

.perfil-opt {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 10px;
  border: 1.5px solid var(--line); cursor: pointer;
  transition: all .15s; background: var(--bg);
}
.perfil-opt:hover { border-color: var(--ink3); }
.perfil-opt.sel { border-color: var(--or); background: var(--or-l); }

.perfil-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.perfil-name { font-size: 13px; font-weight: 700; color: var(--ink); }
.perfil-range { font-size: 11px; color: var(--ink2); margin-top: 2px; }

.modal-actions { display: flex; gap: 8px; margin-top: 24px; }

.btn-cancel {
  flex: 1; padding: 11px;
  border-radius: 8px; border: 1.5px solid var(--line);
  background: transparent; color: var(--ink2);
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all .15s;
}
.btn-cancel:hover { border-color: var(--ink3); color: var(--ink); }

.btn-create {
  flex: 2; padding: 11px;
  border-radius: 8px; border: none;
  background: var(--or); color: var(--white);
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'DM Sans', sans-serif; transition: all .15s;
  letter-spacing: .5px;
}
.btn-create:hover { background: #D94008; }
.btn-create:disabled { background: var(--line); color: var(--ink3); cursor: not-allowed; }

/* ── EMPTY / LOADING ── */
.empty { text-align: center; padding: 80px 20px; }
.empty-icon { font-size: 40px; margin-bottom: 14px; }
.empty h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.empty p { font-size: 13px; color: var(--ink2); margin-bottom: 20px; }
.btn-primary {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: 8px;
  border: none; background: var(--or); color: var(--white);
  font-size: 13px; font-weight: 700; cursor: pointer;
  font-family: 'DM Sans', sans-serif; letter-spacing: .5px;
}

.loading { text-align: center; padding: 80px 20px; color: var(--ink3); font-size: 13px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.wrap > * { animation: fadeUp .35s ease both; }
.wrap > *:nth-child(2) { animation-delay: .05s; }
.wrap > *:nth-child(3) { animation-delay: .1s; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="nav-logo">
      <span class="nav-logo-tx">TX</span>
      <span class="nav-logo-adv">Advisor</span>
    </div>
    <div class="admin-chip">Admin</div>
  </div>
  <div class="nav-right">
    <button class="btn-nps" id="btn-nps" onclick="setNPS()">★ NPS</button>
  </div>
</nav>

<div class="clients-wrap" id="clients-bar"></div>

<div class="wrap">
  <div id="content"><div class="loading">Carregando clientes...</div></div>
</div>

<div class="overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title">Novo Cliente</div>
    <div class="modal-sub">Preencha os dados para iniciar o acompanhamento.</div>
    <label>Empresa</label>
    <input id="m-empresa" type="text" placeholder="Ex: Luctel, BH Celulares..." oninput="checkModal()">
    <label>Mês de início (1–8)</label>
    <input id="m-mes" type="number" min="1" max="8" placeholder="Ex: 1">
    <label>Perfil do cliente</label>
    <div class="perfil-opts">
      <div class="perfil-opt" id="opt-a" onclick="selPerfil('a')">
        <div class="perfil-dot" style="background:#dc2626"></div>
        <div><div class="perfil-name">Sobrevivente</div><div class="perfil-range">Até 40k/mês · Sem processo</div></div>
      </div>
      <div class="perfil-opt" id="opt-b" onclick="selPerfil('b')">
        <div class="perfil-dot" style="background:#d97706"></div>

let clientes=[],ativo=null,modalPerfilSel=null,abaAtiva='clientes';
function toSlug(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}

async function api(m,path,body){
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,{method:m,headers:{...HEADERS,'Prefer':m==='POST'?'return=representation':''},body:body?JSON.stringify(body):undefined});
  if(!r.ok)throw new Error(await r.text());
  return m==='DELETE'?null:r.json();
}

async function loadClientes(){
  try{clientes=await api('GET','clientes?order=created_at.asc');if(clientes.length&&!ativo)ativo=clientes[0].id;renderAll();}
  catch(e){document.getElementById('content').innerHTML='<div class="loading">Erro ao carregar.</div>';}
}

async function saveCliente(c){try{await api('PATCH','clientes?id=eq.'+c.id,{dores:c.dores,fases:c.fases,dc:c.dc,fc:c.fc,fo:c.fo});}catch(e){console.error(e);}}
function getAtivo(){return clientes.find(c=>c.id===ativo);}

function openModal(){document.getElementById('m-empresa').value='';document.getElementById('m-mes').value='';modalPerfilSel=null;['a','b','c'].forEach(p=>document.getElementById('opt-'+p).className='perfil-opt');document.getElementById('btn-create').disabled=true;document.getElementById('modal').style.display='flex';setTimeout(()=>document.getElementById('m-empresa').focus(),100);}
function closeModal(){document.getElementById('modal').style.display='none';}
function selPerfil(p){modalPerfilSel=p;['a','b','c'].forEach(x=>document.getElementById('opt-'+x).className='perfil-opt'+(x===p?' sel':''));checkModal();}
function checkModal(){document.getElementById('btn-create').disabled=!(document.getElementById('m-empresa').value.trim()&&modalPerfilSel);}

async function criarCliente(){
  const empresa=document.getElementById('m-empresa').value.trim();
  if(!empresa||!modalPerfilSel)return;
  document.getElementById('btn-create').disabled=true;
  document.getElementById('btn-create').textContent='Criando...';
  const base=perfisBase[modalPerfilSel],id='c'+Date.now(),slug=toSlug(empresa);
  const mes=parseInt(document.getElementById('m-mes').value)||1;
  const novo={id,empresa,slug,perfil:modalPerfilSel,mes_inicio:mes,dores:[...base.dores],fases:JSON.parse(JSON.stringify(base.fases)),dc:[],fc:{},fo:{}};
  try{await api('POST','clientes',novo);clientes.push(novo);ativo=id;closeModal();renderAll();}
  catch(e){alert('Erro ao criar.');document.getElementById('btn-create').disabled=false;document.getElementById('btn-create').textContent='Criar Cliente';}
}

async function deleteCliente(id){
  if(!confirm('Remover este cliente?'))return;
  try{await api('DELETE','clientes?id=eq.'+id);clientes=clientes.filter(c=>c.id!==id);ativo=clientes.length?clientes[0].id:null;renderAll();}
  catch(e){alert('Erro ao remover.');}
}

function setAtivo(id){abaAtiva='clientes';ativo=id;renderAll();}
function setNPS(){abaAtiva='nps';renderAll();}
function toggleDore(i){const c=getAtivo();const s=new Set(c.dc);s.has(i)?s.delete(i):s.add(i);c.dc=[...s];saveCliente(c);render();}
function deleteDore(i){const c=getAtivo();c.dores.splice(i,1);const s=new Set(c.dc);const n=new Set();s.forEach(x=>{if(x<i)n.add(x);else if(x>i)n.add(x-1);});c.dc=[...n];saveCliente(c);render();}
function addDore(){const el=document.getElementById('nova-dore');const v=el.value.trim();if(!v)return;getAtivo().dores.push(v);el.value='';saveCliente(getAtivo());render();}
function toggleFase(fi){const c=getAtivo();c.fo[fi]=!c.fo[fi];saveCliente(c);render();}
function toggleFaseItem(fi,ii){const c=getAtivo();if(!c.fc[fi])c.fc[fi]=[];const s=new Set(c.fc[fi]);const k='i'+ii;s.has(k)?s.delete(k):s.add(k);c.fc[fi]=[...s];saveCliente(c);render();}
function deleteFaseItem(fi,ii){const c=getAtivo();c.fases[fi].itens.splice(ii,1);if(c.fc[fi]){const s=new Set(c.fc[fi]);const n=new Set();s.forEach(k=>{const x=parseInt(k.slice(1));if(x<ii)n.add('i'+x);else if(x>ii)n.add('i'+(x-1));});c.fc[fi]=[...n];}saveCliente(c);render();}
function addFaseItem(fi){const el=document.getElementById('add-item-'+fi);const v=el.value.trim();if(!v)return;getAtivo().fases[fi].itens.push(v);el.value='';saveCliente(getAtivo());render();}
function copyLink(slug){navigator.clipboard.writeText(window.location.origin+'/cliente?slug='+slug).then(()=>{const b=event.target;b.textContent='Copiado!';setTimeout(()=>b.textContent='Copiar',2000);});}

function renderAll(){renderBar();render();}

function renderBar(){
  const bar=document.getElementById('clients-bar');let h='';
  clientes.forEach(c=>{
    const p=perfisBase[c.perfil],ia=c.id===ativo;
    h+=`<button class="client-tab ${ia?'active':''}" onclick="setAtivo('${c.id}')">
      <div class="client-tab-dot" style="background:${p.dot}"></div>${c.empresa}
      ${ia?`<button class="client-tab-del" onclick="event.stopPropagation();deleteCliente('${c.id}')">×</button>`:''}
    </button>`;
  });
  h+=`<button class="btn-add-tab" onclick="openModal()">+ Novo</button>`;
  bar.innerHTML=h;
  document.getElementById('btn-nps').className='btn-nps'+(abaAtiva==='nps'?' ativo':'');
}

function renderNPS(){
  document.getElementById('content').innerHTML=`
  <div class="nps-stats">
    <div class="nps-stat"><div class="nps-stat-val">4</div><div class="nps-stat-lbl">Responderam</div></div>
    <div class="nps-stat"><div class="nps-stat-val">9.0</div><div class="nps-stat-lbl">Nota Média</div></div>
    <div class="nps-stat"><div class="nps-stat-val">10</div><div class="nps-stat-lbl">Total</div></div>

  <div class="nps-list">

    <div class="nps-row"><div><div class="nps-name">CS Água da Boa</div></div><div><div class="nps-ring nps-ring-10" style="margin:0 auto">10</div></div><div><div class="nps-badge nps-yes" style="margin:0 auto">✓ Sim</div></div><div class="nps-quote">"O grande diferencial é ter alguém fora da sua operação te ajudando."</div></div>

    <div class="nps-row"><div><div class="nps-name">Senhor Smart BH</div></div><div><div class="nps-ring nps-ring-9" style="margin:0 auto">9</div></div><div><div class="nps-badge nps-yes" style="margin:0 auto">✓ Sim</div></div><div class="nps-quote">"Está me ajudando muitoooo. As vezes a gente fica com dúvida, mas faz todo sentido."</div></div>
    <div class="nps-row"><div><div class="nps-name">Ed Celular</div></div><div><div class="nps-ring nps-ring-10" style="margin:0 auto">10</div></div><div><div class="nps-badge nps-yes" style="margin:0 auto">✓ Sim</div></div><div class="nps-quote">"Os prazos e metas nos ajudam a manter foco e constância."</div></div>
    <div class="nps-row"><div><div class="nps-name">Casa do Notebook</div></div><div><div class="nps-ring nps-ring-7" style="margin:0 auto">7</div></div><div><div class="nps-badge nps-yes" style="margin:0 auto">✓ Sim</div></div><div class="nps-quote">"Sinto falha no cronograma e que a metodologia está ultrapassada."</div></div>
    <div class="nps-row pending"><div><div class="nps-name">ISatek</div><div class="nps-sub">Não respondeu</div></div><div><div class="nps-ring nps-ring-empty" style="margin:0 auto">—</div></div><div><div class="nps-badge nps-no" style="margin:0 auto">Pendente</div></div><div class="nps-empty">Aguardando resposta</div></div>
  </div>`;
}

function render(){
  if(abaAtiva==='nps'){renderNPS();return;}
  const ct=document.getElementById('content');const c=getAtivo();
  if(!c){ct.innerHTML='<div class="empty"><div class="empty-icon">🏢</div><h3>Nenhum cliente ainda</h3><p>Adicione o primeiro cliente para começar.</p><button class="btn-primary" onclick="openModal()">+ Adicionar cliente</button></div>';return;}
  const p=perfisBase[c.perfil];const ds=new Set(c.dc);const tot=c.dores.length,dn=ds.size,pct=tot>0?Math.round(dn/tot*100):0;
  const slug=c.slug||toSlug(c.empresa);

  let h=`<div class="profile-head">
    <div class="profile-empresa">${c.empresa.split(' ').map((w,i)=>i===0?`<span>${w}</span>`:w).join(' ')}</div>
    <div class="meta-row">
      <span class="meta-chip orange">${slug}</span>
      <span class="meta-chip">${p.label} · ${p.range}</span>
      <span class="meta-chip">Mês ${c.mes_inicio||1} de 8</span>
    </div>
    <div class="link-row">
      <span>/cliente?slug=${slug}</span>
      <button class="link-copy" onclick="copyLink('${slug}')">Copiar</button>
    </div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${p.color}"></div></div>
    <div class="prog-txt" style="margin-top:6px">${dn} de ${tot} pontos abordados · ${pct}%</div>
  </div>`;

  h+=`<div class="section"><div class="section-head"><span class="section-title">Dores do cliente</span></div>`;
  c.dores.forEach((d,i)=>{
    const ok=ds.has(i);
    h+=`<div class="dore-item ${ok?'done':''}">
      <div class="d-click" onclick="toggleDore(${i})"><div class="d-check">${ok?'✓':''}</div><span class="d-text">${d}</span></div>
      <button class="del-btn" onclick="deleteDore(${i})">×</button>
    </div>`;
  });
  h+=`<div class="add-row"><input id="nova-dore" type="text" placeholder="Adicionar ponto de melhoria..." onkeydown="if(event.key==='Enter')addDore()"><button onclick="addDore()">+ Add</button></div></div>`;

  h+=`<div class="section"><div class="section-head"><span class="section-title">Fases · 8 meses</span></div>`;

  c.fases.forEach((f,fi)=>{
    const cks=new Set(c.fc[fi]||[]);const ft=f.itens.length,fd=cks.size,fp=ft>0?Math.round(fd/ft*100):0;
    const io=!!c.fo[fi];const cor=CORES[fi%CORES.length];
    h+=`<div class="phase-card ${io?'open':''}">
      <div class="phase-header" onclick="toggleFase(${fi})">
        <div class="phase-index">${fi+1}</div>
        <div class="phase-meta">
          <div class="phase-name">${f.t}</div>
          <div class="phase-sub">${f.s} · ${fd}/${ft} itens</div>
        </div>
        <div class="phase-badge">${f.m}</div>
        <div class="phase-chevron">▾</div>
      </div>
      <div class="phase-body">
        <div class="body-label">Etapas</div>`;

    f.itens.forEach((item,ii)=>{
      const ok=cks.has('i'+ii);
      h+=`<div class="check-item ${ok?'done':''}">
        <div class="check-click" onclick="toggleFaseItem(${fi},${ii})"><div class="cbox">${ok?'✓':''}</div><span class="itext">${item}</span></div>
        <button class="del-btn" onclick="deleteFaseItem(${fi},${ii})">×</button>
      </div>`;
    });

    h+=`<div class="add-item-row"><input id="add-item-${fi}" type="text" placeholder="Adicionar item..." onkeydown="if(event.key==='Enter')addFaseItem(${fi})"><button onclick="addFaseItem(${fi})">+ Item</button></div>`;

    if(f.ent&&f.ent.length){
      h+=`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line)"><div class="body-label">Entregáveis</div>`;
      f.ent.forEach(e=>{h+=`<div class="entregavel">${e}</div>`;});
      h+=`</div>`;
    }

    if(f.cp) h+=`<div class="checkpoint">${f.cp}</div>`;

    h+=`<div class="fase-prog">
      <div class="fase-prog-track"><div class="fase-prog-fill" style="width:${fp}%;background:${cor}"></div></div>
      <div class="fase-prog-txt">${fp}% concluído</div>
    </div></div></div>`;
  });

  h+=`</div>`;
  ct.innerHTML=h;
}

loadClientes();
</script>
